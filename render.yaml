services:
  - type: web
    name: clinic-manage
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn clinic_management.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: clinic-manage.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://clinic-manage.onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-manage-db
          property: connectionString

databases:
  - name: clinic-manage-db
    plan: free
